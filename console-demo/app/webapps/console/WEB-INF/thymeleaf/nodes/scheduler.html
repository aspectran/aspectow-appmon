<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/default}">
<head>
    <style>
        .scheduler-card {
            border: 1px solid var(--bs-border-color);
            background: var(--bs-body-bg);
            margin-bottom: 2rem;
        }
        .service-header {
            background: var(--bs-tertiary-bg);
            border-bottom: 1px solid var(--bs-border-color);
            padding: 1rem 1.5rem;
        }
        .schedule-row {
            transition: background-color 0.2s;
        }
        .schedule-row:hover {
            background-color: var(--bs-tertiary-bg);
        }
        .job-table {
            background: var(--bs-secondary-bg);
            border-radius: 8px;
            margin: 0.5rem 0;
        }
        .isolated-icon {
            color: var(--bs-warning);
        }
        .status-badge {
            width: 80px;
            display: inline-block;
            text-align: center;
        }
        .status-pill {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .target-selector {
            background: var(--bs-tertiary-bg);
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--bs-border-color);
        }
        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 0.5rem;
            height: 300px;
            overflow-y: auto;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            border: 1px solid #333;
        }
        .log-line {
            white-space: pre;
            margin-bottom: 0;
            padding: 0;
        }
        .log-header {
            background: #2d2d2d;
            color: #aaa;
            padding: 5px 15px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <th:block layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Scheduler Manager</h2>
                <p class="text-muted mb-0">Monitor and control scheduled jobs across the cluster.</p>
            </div>
            <div class="d-flex flex-column gap-1 align-items-end">
                <div>
                    <span class="text-muted small">Target Mode:</span>
                    <span class="fw-bold text-primary" th:text="${page.clusterMode?.toUpperCase() ?: 'GATEWAY'}">GATEWAY</span>
                </div>
                <div>
                    <span class="text-muted small">Distributed Lock:</span>
                    <span th:if="${page.jobLockProvider}" class="badge bg-success-subtle text-success border border-success-subtle">ENABLED</span>
                    <span th:unless="${page.jobLockProvider}" class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">DISABLED</span>
                </div>
            </div>
        </div>

        <div class="card target-selector mb-4">
            <div class="row align-items-center g-3">
                <div class="col-auto">
                    <label class="fw-bold small text-muted text-uppercase">Target Node</label>
                </div>
                <div class="col-md-3">
                    <select id="node-selector" class="form-select form-select-sm">
                        <!-- Dynamic options -->
                    </select>
                </div>
                <div class="col-auto">
                    <button id="refresh-btn" class="btn btn-outline-primary btn-sm px-3">
                        <i class="bi bi-arrow-clockwise me-1"></i> Refresh
                    </button>
                </div>
                <div class="col text-end">
                    <span id="connection-indicator" class="status-pill bg-secondary text-white">CONNECTING...</span>
                </div>
            </div>
        </div>

        <!-- Summary Section -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <div class="small text-muted text-uppercase fw-bold">Active Schedules</div>
                    <div class="h3 fw-bold mb-0" id="stat-active-schedules">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm p-3">
                    <div class="small text-muted text-uppercase fw-bold">Active Jobs</div>
                    <div class="h3 fw-bold mb-0" id="stat-active-jobs">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm p-3 text-warning">
                    <div class="small text-uppercase fw-bold">Isolated Items</div>
                    <div class="h3 fw-bold mb-0" id="stat-isolated">-</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm p-3 text-info">
                    <div class="small text-uppercase fw-bold">Target Node</div>
                    <div class="h3 fw-bold mb-0 text-truncate" id="stat-current-node">-</div>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div id="scheduler-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 text-muted">Connecting to node and fetching data...</p>
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="script">
        <script th:src="@{/assets/js/console-client.js}"></script>
        <script th:inline="javascript">
            let nodes = [[${page.nodes}]];
            const BASE_PATH = [[@{/}]].replace(/\/$/, '');
            let consoleClient = null;
            let currentNodeId = [[${page.node.id}]];

            function refreshNodeList() {
                return fetch(BASE_PATH + "/nodes/scheduler/list")
                    .then(res => res.json())
                    .then(data => {
                        nodes = data;
                        renderNodeSelector();
                        return data;
                    });
            }

            function renderNodeSelector() {
                const $select = $('#node-selector');
                $select.empty();
                nodes.forEach(n => {
                    const option = new Option(n.title + ' (' + n.id + ')', n.id);
                    if (n.status && n.status.toUpperCase() === 'DEAD') {
                        $(option).addClass('text-danger');
                        option.text += ' [DEAD]';
                    }
                    $select.append(option);
                });
                $select.val(currentNodeId);
            }

            function connectToNode(nodeId, forceStatusCheck = false) {
                if (forceStatusCheck) {
                    refreshNodeList().then(() => doConnectToNode(nodeId));
                } else {
                    doConnectToNode(nodeId);
                }
            }

            function doConnectToNode(nodeId) {
                if (consoleClient) {
                    consoleClient.stop();
                }

                currentNodeId = nodeId;
                updateStats('-', '-', '-', nodeId);

                const nodeInfo = nodes.find(n => n.id === nodeId);
                if (nodeInfo && nodeInfo.status && nodeInfo.status.toUpperCase() === 'DEAD') {
                    $('#connection-indicator').text("NODE DEAD").removeClass("bg-success bg-warning bg-secondary").addClass("bg-danger");
                    $('#scheduler-container').html(`
                        <div class="text-center py-5">
                            <i class="bi bi-exclamation-triangle fs-1 text-danger mb-3"></i>
                            <h5 class="fw-bold">Node Unreachable</h5>
                            <p class="text-muted">The target node <strong>${nodeId}</strong> is currently in DEAD state.</p>
                            <button class="btn btn-sm btn-outline-primary mt-2" onclick="connectToNode('${nodeId}', true)">
                                <i class="bi bi-arrow-clockwise me-1"></i> Try Again
                            </button>
                        </div>
                    `);
                    return;
                }

                $('#connection-indicator').text("CONNECTING...").removeClass("bg-success bg-danger bg-warning").addClass("bg-secondary");
                $('#scheduler-container').html('<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Fetching data from ' + nodeId + '...</p></div>');

                const node = {
                    id: nodeId,
                    endpoint: {
                        path: BASE_PATH + "/nodes" // Standard base path
                    }
                };

                consoleClient = new ConsoleClient(node, {
                    onBeforeConnect: () => {
                        return fetch(BASE_PATH + "/nodes/token")
                            .then(response => response.text())
                            .catch(err => {
                                console.error("Failed to fetch new token:", err);
                                return null;
                            });
                    },
                    onMessage: (message) => {
                        const error = message.error;
                        if (error) {
                            console.error("Received error from scheduler bridge:", error);
                            return;
                        }

                        const result = message.result;
                        if (result) {
                            if (typeof result === 'string' && result.startsWith('scheduler:log:')) {
                                handleRelayMessage(result);
                            } else {
                                try {
                                    // result can be a JSON string or an already parsed object depending on transport
                                    const event = (typeof result === 'string' ? JSON.parse(result) : result);
                                    handleRelayMessage(event);
                                } catch (e) {
                                    console.error("Failed to parse scheduler result:", e, result);
                                }
                            }
                        }
                    },
                    onEstablished: () => {
                        $('#connection-indicator').text("CONNECTED").removeClass("bg-secondary bg-danger bg-warning").addClass("bg-success");
                        const message = {
                            header: "execute",
                            command: "list",
                            targetNodeId: currentNodeId
                        };
                        consoleClient.sendMessage(JSON.stringify(message));
                    },
                    onRetry: (count, max) => {
                        $('#connection-indicator').text(`RECONNECTING (${count}/${max})...`).removeClass("bg-success bg-danger").addClass("bg-warning");
                    },
                    onClose: (event) => {
                        $('#connection-indicator').text(event.code === 1003 ? "SESSION EXPIRED" : "DISCONNECTED")
                            .removeClass("bg-success bg-warning").addClass("bg-danger");
                    }
                });
                consoleClient.start('scheduler'); // Appends 'scheduler' to '/nodes'
            }

            function handleRelayMessage(data) {
                if (typeof data === 'string' && data.startsWith('scheduler:log:')) {
                    appendLogLine(data);
                    return;
                }
                if (data.type === 'list') {
                    renderSchedulerList(data.services);
                } else if (data.type === 'result') {
                    if (data.success) {
                        // Success message toast could be added here
                    } else {
                        alert(data.message);
                    }
                }
            }

            function renderSchedulerList(services) {
                let html = '';
                let totalSchedules = 0;
                let totalActiveSchedules = 0;
                let totalActiveJobs = 0;
                let totalIsolated = 0;

                if (!services || services.length === 0) {
                    $('#scheduler-container').html('<div class="alert alert-info">No active services or schedulers found on this node.</div>');
                    updateStats(0, 0, 0, 0);
                    return;
                }

                services.forEach(service => {
                    const serviceId = service.serviceName.replace(/[^a-zA-Z0-9]/g, '_');
                    html += `<div class="card scheduler-card shadow-sm overflow-hidden">
                        <div class="service-header d-flex align-items-center gap-3">
                            <i class="bi bi-gear-wide-connected fs-4 text-primary"></i>
                            <div>
                                <h5 class="fw-bold mb-0">${service.serviceName}</h5>
                                <small class="text-muted">Context: ${service.contextName}</small>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table mb-0 align-middle">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;"></th>
                                        <th>Schedule ID</th>
                                        <th>Trigger / Expression</th>
                                        <th class="text-center">Status</th>
                                        <th class="text-end" style="width: 150px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>`;

                    if (!service.schedules || service.schedules.length === 0) {
                        html += `<tr><td colspan="5" class="text-center text-muted py-4">No schedules defined in this service.</td></tr>`;
                    } else {
                        service.schedules.forEach(schedule => {
                            totalSchedules++;
                            const isScheduleEnabled = !schedule.disabled;
                            const isScheduleIsolated = schedule.isolated;
                            if (isScheduleEnabled) totalActiveSchedules++;
                            if (isScheduleIsolated) totalIsolated++;

                            html += `<tr class="schedule-row">
                                <td class="text-center">
                                    <button class="btn btn-link btn-sm p-0 text-decoration-none" type="button" data-bs-toggle="collapse" data-bs-target="#jobs-${serviceId}-${schedule.id}">
                                        <i class="bi bi-chevron-down"></i>
                                    </button>
                                </td>
                                <td class="fw-medium">
                                    ${isScheduleIsolated ? '<i class="bi bi-lock-fill isolated-icon me-1" title="Isolated"></i>' : ''}
                                    ${schedule.id}
                                </td>
                                <td>
                                    <code class="small px-2 py-1 bg-body-tertiary rounded">${schedule.scheduler?.trigger?.expression?.expression || schedule.scheduler?.trigger?.type || 'N/A'}</code>
                                </td>
                                <td class="text-center">
                                    <span class="badge rounded-pill status-badge ${isScheduleEnabled ? 'text-bg-success' : 'text-bg-danger'}">
                                        ${isScheduleEnabled ? 'ACTIVE' : 'DISABLED'}
                                    </span>
                                </td>
                                <td class="text-end">
                                    <div class="form-check form-switch d-inline-block">
                                        <input class="form-check-input" type="checkbox" role="switch" 
                                            ${isScheduleEnabled ? 'checked' : ''} 
                                            ${isScheduleIsolated ? 'disabled' : ''}
                                            onclick="toggleState('${service.serviceName}', 'schedule', '${schedule.id}', this.checked)">
                                    </div>
                                </td>
                            </tr>
                            <tr class="collapse" id="jobs-${serviceId}-${schedule.id}">
                                <td colspan="5" class="p-0">
                                    <div class="p-3">
                                        <div class="job-table p-3">
                                            <div class="small fw-bold text-muted mb-2 text-uppercase">Jobs in this Schedule</div>
                                            <div class="list-group list-group-flush border-top border-bottom">`;
                            
                            if (schedule.job) {
                                (Array.isArray(schedule.job) ? schedule.job : [schedule.job]).forEach(job => {
                                    const isJobEnabled = !job.disabled;
                                    const isJobIsolated = job.isolated;
                                    if (isJobEnabled && isScheduleEnabled) totalActiveJobs++;
                                    if (isJobIsolated) totalIsolated++;

                                    html += `<div class="list-group-item d-flex justify-content-between align-items-center bg-transparent border-0 px-0 py-2">
                                        <div class="d-flex align-items-center gap-2">
                                            <i class="bi bi-play-circle small ${isJobEnabled ? 'text-success' : 'text-muted'}"></i>
                                            <span class="${isJobEnabled ? '' : 'text-muted'}">${job.translet}</span>
                                            ${isJobIsolated ? '<i class="bi bi-lock-fill isolated-icon small" title="Isolated"></i>' : ''}
                                        </div>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch" 
                                                ${isJobEnabled ? 'checked' : ''} 
                                                ${(isJobIsolated || isScheduleIsolated) ? 'disabled' : ''}
                                                onclick="toggleState('${service.serviceName}', 'job', '${job.translet}', this.checked)">
                                        </div>
                                    </div>`;
                                });
                            }

                            html += `       </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>`;
                        });
                    }

                    html += `   </tbody>
                            </table>
                        </div>`;

                    if (service.schedules && service.schedules.length > 0) {
                        html += `<!-- Log Viewer Section -->
                        <div class="log-header">
                            <span><i class="bi bi-terminal me-2"></i>Live Scheduler Logs</span>
                            <div class="d-flex align-items-center gap-3">
                                <button class="btn btn-link btn-xs text-secondary p-0 me-3 text-decoration-none" onclick="clearLog('${service.loggingGroup}')">
                                    <i class="bi bi-trash3"></i> Clear
                                </button>
                                <div class="form-check form-check-inline mb-0 p-0 d-flex align-items-center">
                                    <input class="form-check-input mt-0 me-2" type="checkbox" id="auto-scroll-${service.loggingGroup}" checked style="cursor:pointer">
                                    <label class="form-check-label text-secondary" for="auto-scroll-${service.loggingGroup}" style="cursor:pointer; font-size: 0.75rem;">Auto-scroll</label>
                                </div>
                            </div>
                        </div>
                        <div id="log-viewer-${service.loggingGroup}" class="log-container">
                            <div class="text-muted italic">Waiting for logs...</div>
                        </div>`;
                    }

                    html += `</div>`;
                });

                $('#scheduler-container').html(html);
                updateStats(totalActiveSchedules, totalActiveJobs, totalIsolated, currentNodeId);
            }

            function appendLogLine(rawMessage) {
                // Format: scheduler:log:{loggingGroup}:{line}
                const parts = rawMessage.split(':');
                if (parts.length < 4) return;

                const loggingGroup = parts[2];
                const content = rawMessage.substring(rawMessage.indexOf(':', 14) + 1);

                const $container = $(`#log-viewer-${loggingGroup}`);
                if ($container.length === 0) return;

                // Remove placeholder on first message
                if ($container.find('.text-muted').length > 0) {
                    $container.empty();
                }

                const $line = $('<p class="log-line"></p>').text(content);
                $container.append($line);

                // Limit lines to 1000 for performance
                if ($container.children().length > 1000) {
                    $container.children().first().remove();
                }

                if ($(`#auto-scroll-${loggingGroup}`).is(':checked')) {
                    $container.scrollTop($container[0].scrollHeight);
                }
            }

            function clearLog(loggingGroup) {
                const $container = $(`#log-viewer-${loggingGroup}`);
                $container.empty().append('<div class="text-muted italic">Log cleared.</div>');
            }

            function updateStats(schedules, jobs, isolated, node) {
                $('#stat-active-schedules').text(schedules);
                $('#stat-active-jobs').text(jobs);
                $('#stat-isolated').text(isolated);
                $('#stat-current-node').text(node);
            }

            function toggleState(serviceName, type, id, checked) {
                const command = checked ? 'enable' : 'disable';
                const message = {
                    header: "execute",
                    command: command,
                    targetNodeId: currentNodeId,
                    serviceName: serviceName
                };
                if (type === 'schedule') message.scheduleId = id;
                if (type === 'job') message.jobName = id;

                consoleClient.sendMessage(JSON.stringify(message));
            }

            $(function() {
                renderNodeSelector();
                connectToNode(currentNodeId);

                $('#node-selector').on('change', function() {
                    const nodeId = $(this).val();
                    const url = new URL(window.location);
                    url.searchParams.set('nodeId', nodeId);
                    window.history.replaceState({}, '', url);
                    connectToNode(nodeId);
                });

                $('#refresh-btn').on('click', function() {
                    refreshNodeList().then(() => {
                        if (consoleClient && consoleClient.established && consoleClient.mode === 'websocket') {
                            const message = {
                                header: "execute",
                                command: "list",
                                targetNodeId: currentNodeId
                            };
                            consoleClient.sendMessage(JSON.stringify(message));
                        } else {
                            doConnectToNode(currentNodeId);
                        }
                    });
                });
            });
        </script>
    </th:block>
</body>
</html>
